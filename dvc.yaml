stages:
  parse:
    cmd: pixi run python src/parse_corpus.py
    deps:
      - src/parse_corpus.py
      - corpus_raw/ru-fr_interference/2/RUFRcorr.csv
      - corpus_raw/ru-fr_interference/2/metadata_RUFR.csv
      - corpus_raw/ru-fr_interference/2/wav_et_textgrids/FRcorp_textgrids_only
    outs:
      - data/features_phonemes.csv

  clean:
    cmd: pixi run python src/clean_phonemes.py
    deps:
      - src/clean_phonemes.py
      - data/features_phonemes.csv
    outs:
      - data/features_phonemes_clean.csv

  acoustic:
    cmd: pixi run python src/extract_acoustics.py
    deps:
      - src/extract_acoustics.py
      - data/features_phonemes_clean.csv
    outs:
      - data/features_acoustic.csv

  neural:
    cmd: pixi run python src/extract_neural.py
    deps:
      - src/extract_neural.py
      - data/features_phonemes_clean.csv
    outs:
      - data/features_whisper_L06.npz
      - data/features_whisper_L20.npz
      - data/features_xlsr_L03.npz
      - data/features_xlsr_L12.npz
      - data/features_xlsr_L20.npz
      - data/features_neural_index.csv

  normalise:
    cmd: pixi run python src/normalise.py
    deps:
      - src/normalise.py
      - data/features_acoustic.csv
      - data/features_whisper_L06.npz
      - data/features_whisper_L20.npz
      - data/features_xlsr_L03.npz
      - data/features_xlsr_L12.npz
      - data/features_xlsr_L20.npz
    outs:
      - data/features_acoustic_norm.csv
      - data/reduced_whisper_L06_pca2.npz
      - data/reduced_whisper_L06_pca50.npz
      - data/reduced_whisper_L06_umap2.npz
      - data/reduced_whisper_L20_pca2.npz
      - data/reduced_whisper_L20_pca50.npz
      - data/reduced_whisper_L20_umap2.npz
      - data/reduced_xlsr_L03_pca2.npz
      - data/reduced_xlsr_L03_pca50.npz
      - data/reduced_xlsr_L03_umap2.npz
      - data/reduced_xlsr_L12_pca2.npz
      - data/reduced_xlsr_L12_pca50.npz
      - data/reduced_xlsr_L12_umap2.npz
      - data/reduced_xlsr_L20_pca2.npz
      - data/reduced_xlsr_L20_pca50.npz
      - data/reduced_xlsr_L20_umap2.npz

  analyse_5_1:
    cmd: pixi run python src/analyse_5_1_acoustic.py
    deps:
      - src/analyse_5_1_acoustic.py
      - data/features_acoustic_norm.csv
    outs:
      - data/section5_summary.csv
      - data/section5_variance.csv
      - figures/fig_5_1_vowel_chart.png
      - figures/fig_5_1_boxplots.png
      - figures/fig_5_1_intraspeaker.png

  analyse_5_2:
    cmd: pixi run python src/analyse_5_2_neural.py
    deps:
      - src/analyse_5_2_neural.py
      - data/features_neural_index.csv
      - data/features_whisper_L06.npz
      - data/features_whisper_L20.npz
      - data/features_xlsr_L03.npz
      - data/features_xlsr_L12.npz
      - data/features_xlsr_L20.npz
      - data/reduced_whisper_L06_pca2.npz
      - data/reduced_whisper_L06_umap2.npz
      - data/reduced_whisper_L20_pca2.npz
      - data/reduced_whisper_L20_umap2.npz
      - data/reduced_xlsr_L03_pca2.npz
      - data/reduced_xlsr_L03_umap2.npz
      - data/reduced_xlsr_L12_pca2.npz
      - data/reduced_xlsr_L12_umap2.npz
      - data/reduced_xlsr_L20_pca2.npz
      - data/reduced_xlsr_L20_umap2.npz
    outs:
      - data/section5_2_variance_ratio.csv
      - data/section5_2_cosine_ratio.csv
      - figures/fig_5_2_whisper_L06.png
      - figures/fig_5_2_whisper_L20.png
      - figures/fig_5_2_xlsr_L03.png
      - figures/fig_5_2_xlsr_L12.png
      - figures/fig_5_2_xlsr_L20.png

  analyse_5_3:
    cmd: pixi run python src/analyse_5_3_rsm.py
    deps:
      - src/analyse_5_3_rsm.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section5_3_mantel.csv
      - figures/fig_5_3_rsm.png

  analyse_6_1:
    cmd: pixi run python src/analyse_6_1_groups.py
    deps:
      - src/analyse_6_1_groups.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section6_1_acoustic.csv
      - data/section6_1_gender.csv
      - data/section6_1_neural.csv

  analyse_6_2:
    cmd: pixi run python src/analyse_6_2_distances.py
    deps:
      - src/analyse_6_2_distances.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section6_2_dms.npz
      - data/section6_2_bootstrap.csv
      - data/section6_2_f1_acoustic.csv
      - data/section6_2_f1_whisper_L20.csv
      - data/section6_2_f1_xlsr_L12.csv
      - data/section6_2_cm_acoustic.csv
      - data/section6_2_cm_whisper_L20.csv
      - data/section6_2_cm_xlsr_L12.csv
      - data/section6_2_l1l2_accuracy.csv
      - data/section6_2_mcnemar.csv
      - figures/fig_6_2_cm_acoustic.png
      - figures/fig_6_2_cm_whisper_L20.png
      - figures/fig_6_2_cm_xlsr_L12.png

  analyse_7_lme:
    cmd: pixi run python src/analyse_7_lme.py
    deps:
      - src/analyse_7_lme.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section7_acoustic.csv
      - data/section7_neural_whisper_L20.csv
      - data/section7_neural_xlsr_L12.csv

  analyse_7_robust:
    cmd: pixi run python src/analyse_7_robust.py
    deps:
      - src/analyse_7_robust.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section7_robust_acoustic.csv
      - data/section7_robust_whisper_L20.csv
      - data/section7_robust_xlsr_L12.csv

  analyse_8:
    cmd: pixi run python src/analyse_8_rope.py
    deps:
      - src/analyse_8_rope.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section8_acoustic_ci.csv
      - data/section8_neural_ci.csv
      - data/section8_acoustic_classified.csv
      - data/section8_neural_classified.csv
      - figures/fig_8_forest_acoustic.png
      - figures/fig_8_forest_neural.png

  analyse_9:
    cmd: pixi run python src/analyse_9_clustering.py
    deps:
      - src/analyse_9_clustering.py
      - data/features_acoustic_norm.csv
      - data/features_neural_index.csv
      - data/features_whisper_L20.npz
      - data/features_xlsr_L12.npz
    outs:
      - data/section9_1_vowels.csv
      - data/section9_2_cv.csv
      - data/section9_3_speakers.csv
      - data/section9_4_k.csv
      - figures/fig_9_1_dendro_acoustic_F1F2.png
      - figures/fig_9_1_dendro_whisper_L20.png
      - figures/fig_9_1_dendro_xlsr_L12.png
      - figures/fig_9_2_dendro_acoustic_extended.png
      - figures/fig_9_2_dendro_whisper_L20.png
      - figures/fig_9_2_dendro_xlsr_L12.png
      - figures/fig_9_3_dendro_acoustic.png
      - figures/fig_9_3_dendro_whisper_L20.png
      - figures/fig_9_3_dendro_xlsr_L12.png
      - figures/fig_9_4_silhouette.png